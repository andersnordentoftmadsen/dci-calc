<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DCI Aspect Ratio Calculator</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DCI Calc">
<meta name="theme-color" content="#0a0a0a">
<style>
:root{--bg:#0a0a0a;--fg:#fff;--accent:#00ff88;--card:#111;--inp:#1a1a1a;--bdr:#2a2a2a;--warn:#fa0;--err:#f55;--ok:#00ff88}
body.light{--bg:#f0f0f0;--fg:#111;--accent:#0055cc;--card:#fff;--inp:#e4e4e4;--bdr:#ccc;--warn:#b60;--err:#c00;--ok:#077}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--fg);font-family:Arial,sans-serif;min-height:100vh;overscroll-behavior:none}
#header{background:var(--card);border-bottom:1px solid var(--bdr);padding:0.7em 1em;padding-top:max(0.7em,env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
#header h1{color:var(--accent);font-size:1.15em}
#header-btns{display:flex;gap:.5em}
#main{max-width:980px;margin:0 auto;padding:1em;padding-bottom:max(1em,env(safe-area-inset-bottom))}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:1em;margin-bottom:1em}
.ct{font-size:.75em;font-weight:bold;text-transform:uppercase;letter-spacing:.09em;color:var(--accent);margin-bottom:.7em}
.cg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75em}
@media(max-width:580px){.cg{grid-template-columns:1fr}}
.cl{font-size:.78em;font-weight:bold;text-transform:uppercase;letter-spacing:.05em;opacity:.7;display:flex;flex-direction:column;gap:.3em}
input[type=text],select{width:100%;padding:.5em .6em;font-size:1em;background:var(--inp);color:var(--fg);border:1px solid var(--bdr);border-radius:5px;font-weight:normal;text-transform:none;letter-spacing:normal;opacity:1;min-height:44px}
input[type=text]:focus,select:focus{outline:none;border-color:var(--accent)}
.presets{display:flex;flex-wrap:wrap;gap:.4em;margin-top:.8em}
.pb{background:var(--inp);border:1px solid var(--bdr);color:var(--fg);padding:.4em .75em;font-size:.83em;border-radius:20px;cursor:pointer;min-height:36px}
.pb.active,.pb:hover{background:var(--accent);color:#000;border-color:var(--accent)}
.tabs{display:flex;border-bottom:2px solid var(--bdr);margin-bottom:1em}
.tb{background:none;border:none;border-bottom:3px solid transparent;color:var(--fg);padding:.65em 1em;font-size:.92em;cursor:pointer;opacity:.5;margin-bottom:-2px;min-height:44px}
.tb.active{opacity:1;border-bottom-color:var(--accent);font-weight:bold}
.tp{display:none}.tp.active{display:block}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:1em}
@media(max-width:580px){.rg{grid-template-columns:1fr}}
.cw{margin:.5em 0}
canvas{display:block;width:100%;height:auto;border:1px solid var(--bdr);border-radius:4px;cursor:zoom-in}
.sr{display:flex;justify-content:space-between;padding:.32em 0;border-bottom:1px solid var(--bdr);font-size:.88em}
.sr:last-child{border-bottom:none}
.sk{opacity:.6}.sv{font-weight:bold}
.wb{margin-top:.5em;padding:.35em .55em;border-radius:4px;font-size:.83em;border-left:3px solid var(--warn);background:rgba(255,170,0,.09);color:var(--warn)}
.ob{margin-top:.5em;padding:.35em .55em;border-radius:4px;font-size:.83em;border-left:3px solid var(--ok);background:rgba(0,255,136,.07);color:var(--ok)}
.eb{color:var(--err);font-weight:bold;padding:.5em 0}
.ar{display:flex;flex-wrap:wrap;gap:.45em;margin-top:.7em}
.ab{flex:1;min-width:90px;min-height:44px;background:var(--inp);border:1px solid var(--bdr);color:var(--fg);padding:.5em .7em;font-size:.85em;border-radius:5px;cursor:pointer}
.ab:hover{border-color:var(--accent);color:var(--accent)}
.ab.p{background:var(--accent);color:#000;border-color:var(--accent);font-weight:bold}
.xp{background:var(--inp);border:1px solid var(--bdr);border-radius:5px;padding:.75em;font-family:monospace;font-size:.8em;white-space:pre;overflow-x:auto;line-height:1.65;margin:.5em 0 .75em}
.xt{color:#6ab0f5}.xv{color:#f0c060}.xc{color:#888}
.rev-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75em}
@media(max-width:480px){.rev-grid{grid-template-columns:1fr}}
.br{font-size:2em;font-weight:bold;color:var(--accent);display:block;margin:.2em 0 .1em}
.rr{font-size:.87em;margin-bottom:.35em;padding:.25em 0;border-bottom:1px solid var(--bdr)}
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:200;align-items:center;justify-content:center;padding:1em}
#modal.open{display:flex}
#mc{max-width:100%;max-height:90vh;cursor:zoom-out}
#toast{position:fixed;bottom:max(1.5em,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(80px);background:var(--accent);color:#000;padding:.5em 1.2em;border-radius:20px;font-weight:bold;font-size:.9em;z-index:300;opacity:0;transition:transform .28s,opacity .28s;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.ib{background:none;border:1px solid var(--bdr);color:var(--fg);padding:.4em .75em;font-size:.95em;border-radius:5px;cursor:pointer;min-height:44px}
.ib:hover{border-color:var(--accent)}
hr{border:none;border-top:1px solid var(--bdr);margin:.7em 0}
#ibar{display:none;background:var(--card);border-bottom:1px solid var(--bdr);padding:.6em 1em;align-items:center;justify-content:space-between;gap:.75em;font-size:.88em}
#ibar.show{display:flex}
#ibar button{background:var(--accent);color:#000;border:none;padding:.4em 1em;border-radius:5px;font-weight:bold;cursor:pointer;white-space:nowrap;min-height:36px}
#idismiss{background:none!important;color:var(--fg)!important;opacity:.5;font-weight:normal!important}
</style>
</head>
<body>

<div id="ibar">
  <span id="imsg"></span>
  <div style="display:flex;gap:.5em;flex-shrink:0">
    <button id="ibtn" style="display:none">Install</button>
    <button id="idismiss">✕</button>
  </div>
</div>

<div id="header">
  <h1>🎬 DCI Calc</h1>
  <div id="header-btns">
    <button class="ib" id="shareBtn">🔗 Share</button>
    <button class="ib" id="themeBtn">🌙</button>
  </div>
</div>

<div id="main">
  <div class="card">
    <div class="ct">Settings</div>
    <div class="cg">
      <label class="cl">Aspect Ratio
        <input type="text" id="ratio" placeholder="e.g. 2.39 or 16:9" autocomplete="off" spellcheck="false" inputmode="decimal">
      </label>
      <label class="cl">Container
        <select id="container">
          <option value="full">Full  (2048×1080 / 4096×2160)</option>
          <option value="flat">Flat  (1998×1080 / 3996×2160)</option>
          <option value="scope">Scope (2048×858  / 4096×1718)</option>
        </select>
      </label>
      <label class="cl">Resolution
        <select id="resolution">
          <option value="both">Both 2K &amp; 4K</option>
          <option value="2k">2K only</option>
          <option value="4k">4K only</option>
        </select>
      </label>
    </div>
    <div class="ct" style="margin-top:1em;margin-bottom:.4em">Quick Presets</div>
    <div class="presets" id="presets"></div>
  </div>

  <div class="tabs">
    <button class="tb active" data-tab="layout">📐 Layout</button>
    <button class="tb" data-tab="xml">📄 DCP XML</button>
    <button class="tb" data-tab="reverse">🔄 Reverse</button>
  </div>

  <div class="tp active" id="pane-layout"><div id="layout-out"></div></div>

  <div class="tp" id="pane-xml">
    <div class="card">
      <div class="ct">SMPTE 429-8 — MainPictureActiveArea</div>
      <p style="font-size:.83em;opacity:.6;margin-bottom:.5em">Ready-to-paste XML for your DCP composition playlist.</p>
      <div id="xml-out"></div>
    </div>
  </div>

  <div class="tp" id="pane-reverse">
    <div class="card">
      <div class="ct">Reverse Lookup — Pixels → Ratio</div>
      <p style="font-size:.83em;opacity:.6;margin-bottom:.75em">Enter your active frame dimensions to find the aspect ratio and bar sizes.</p>
      <div class="rev-grid">
        <label class="cl">Width (px)<input type="text" id="rev-w" placeholder="e.g. 1998" autocomplete="off" inputmode="numeric"></label>
        <label class="cl">Height (px)<input type="text" id="rev-h" placeholder="e.g. 1080" autocomplete="off" inputmode="numeric"></label>
      </div>
      <div id="rev-out"></div>
    </div>
  </div>
</div>

<div id="modal"><canvas id="mc"></canvas></div>
<div id="toast"></div>

<script>
var PRESETS=[
  {label:'1.33  Academy',v:'1.33'},{label:'1.43  IMAX',v:'1.43'},
  {label:'1.78  16:9',v:'1.78'},{label:'1.85  Flat',v:'1.85'},
  {label:'2.00  Univisium',v:'2.00'},{label:'2.20  Todd-AO',v:'2.20'},
  {label:'2.39  Scope',v:'2.39'},{label:'2.76  Ultra Pana',v:'2.76'},
];
var RES={'2k':{w:2048,h:1080,label:'DCI 2K'},'4k':{w:4096,h:2160,label:'DCI 4K'}};
var CONTAINERS={
  full: {'2k':{w:2048,h:1080},'4k':{w:4096,h:2160}},
  flat: {'2k':{w:1998,h:1080},'4k':{w:3996,h:2160}},
  scope:{'2k':{w:2048,h:858}, '4k':{w:4096,h:1718}},
};
var RATIO_EPS=0.005, SNAP_EPS=0.01;
var state={results:[],resizeRaf:null,toastTimer:null,deferredPWA:null};

function parseRatio(raw){
  var s=raw.trim().replace(/[^0-9.:/]/g,'');
  if(!s)return null;
  var sep=s.indexOf(':')>=0?':':s.indexOf('/')>=0?'/':null;
  if(sep){var p=s.split(sep).map(Number);return(p.length===2&&p[0]>0&&p[1]>0&&!isNaN(p[0])&&!isNaN(p[1]))?p[0]/p[1]:null;}
  var n=parseFloat(s);return(n>0&&!isNaN(n))?n:null;
}
function gcd(a,b){return b===0?a:gcd(b,a%b);}
function getContainer(fmt,rk){return CONTAINERS[fmt][rk];}

function findKnownArea(ratio,rk){
  var fmts=['flat','scope'];
  for(var i=0;i<fmts.length;i++){var c=CONTAINERS[fmts[i]][rk];if(Math.abs(ratio-c.w/c.h)<SNAP_EPS)return{w:c.w,h:c.h};}
  return null;
}

function getFit(cw,ch,ratio){
  var cr=cw/ch,w,h,barType,barPx;
  if(cr>ratio+RATIO_EPS){h=ch;w=Math.min(Math.ceil(h*ratio/2)*2,cw);barType='pillarbox';barPx=Math.round((cw-w)/2);}
  else if(cr<ratio-RATIO_EPS){w=cw;h=Math.min(Math.ceil(w/ratio/2)*2,ch);barType='letterbox';barPx=Math.round((ch-h)/2);}
  else{w=cw;h=ch;barType='letterbox';barPx=0;}
  return{w:w,h:h,barType:barType,barPx:barPx};
}

function activeCoords(r){
  var cox=Math.round((r.base.w-r.cont.w)/2),coy=Math.round((r.base.h-r.cont.h)/2);
  var x0=cox+Math.round((r.cont.w-r.fit.w)/2),y0=coy+Math.round((r.cont.h-r.fit.h)/2);
  return{x0:x0,y0:y0,x1:x0+r.fit.w-1,y1:y0+r.fit.h-1};
}

function stripePattern(ctx,rgba){
  var p=document.createElement('canvas');p.width=p.height=14;
  var g=p.getContext('2d');g.strokeStyle=rgba;g.lineWidth=4;
  g.beginPath();g.moveTo(0,14);g.lineTo(14,0);g.stroke();
  return ctx.createPattern(p,'repeat');
}

function oText(ctx,txt,x,y,fill,stk,font,align,base){
  ctx.save();ctx.font=font;ctx.textAlign=align;ctx.textBaseline=base;
  ctx.lineWidth=3;ctx.strokeStyle=stk;ctx.strokeText(txt,x,y);
  ctx.fillStyle=fill;ctx.fillText(txt,x,y);ctx.restore();
}

function drawCanvas(canvas,baseW,baseH,contW,contH,fw,fh,label,barType,barPx,drawW){
  var dpr=window.devicePixelRatio||1,cssW=drawW,cssH=Math.round(cssW*baseH/baseW);
  canvas.width=cssW*dpr;canvas.height=cssH*dpr;
  canvas.style.width=cssW+'px';canvas.style.height=cssH+'px';
  var ctx=canvas.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);
  var il=document.body.classList.contains('light');
  ctx.fillStyle=il?'#d8d8d8':'#0a0a0a';ctx.fillRect(0,0,cssW,cssH);
  var sc=Math.min(cssW/baseW,cssH/baseH),ox=(cssW-baseW*sc)/2,oy=(cssH-baseH*sc)/2;
  ctx.strokeStyle=il?'#999':'#444';ctx.lineWidth=1;ctx.strokeRect(ox,oy,baseW*sc,baseH*sc);
  var cox=Math.round((baseW-contW)/2),coy=Math.round((baseH-contH)/2);
  var csx=ox+cox*sc,csy=oy+coy*sc;
  if(contW!==baseW||contH!==baseH){
    ctx.save();ctx.strokeStyle=il?'#bbb':'#555';ctx.lineWidth=1;ctx.setLineDash([4,4]);
    ctx.strokeRect(csx,csy,contW*sc,contH*sc);ctx.restore();
  }
  var aox=cox+Math.round((contW-fw)/2),aoy=coy+Math.round((contH-fh)/2);
  var ax=ox+aox*sc,ay=oy+aoy*sc,aws=fw*sc,ahs=fh*sc;
  var bCol=barType==='letterbox'?'rgba(80,120,255,0.45)':'rgba(220,60,60,0.45)';
  ctx.fillStyle=stripePattern(ctx,bCol);
  if(barType==='letterbox'){var bh=Math.round((contH-fh)/2)*sc;if(bh>0){ctx.fillRect(csx,csy,contW*sc,bh);ctx.fillRect(csx,ay+ahs,contW*sc,bh);}}
  else{var bw=Math.round((contW-fw)/2)*sc;if(bw>0){ctx.fillRect(csx,csy,bw,contH*sc);ctx.fillRect(ax+aws,csy,bw,contH*sc);}}
  ctx.globalAlpha=0.82;ctx.fillStyle='#00bb60';ctx.fillRect(ax,ay,aws,ahs);ctx.globalAlpha=1;
  ctx.strokeStyle='#00ff88';ctx.lineWidth=1.5;ctx.strokeRect(ax,ay,aws,ahs);
  var cSz=Math.max(aws/30,8),pSz=Math.max(aws/24,9),lSz=Math.max(Math.min(aws/(label.length*0.6),ahs*0.22),10);
  var ts='rgba(0,0,0,0.75)',tf='#fff';
  oText(ctx,label,cssW/2,cssH/2,tf,ts,'bold '+lSz+'px Arial','center','middle');
  var x0=aox,y0=aoy,x1=x0+fw-1,y1=y0+fh-1,cf='bold '+cSz+'px Arial',pd=4;
  oText(ctx,x0+','+y0,ax+pd,ay+pd,tf,ts,cf,'left','top');
  oText(ctx,x1+','+y0,ax+aws-pd,ay+pd,tf,ts,cf,'right','top');
  oText(ctx,x0+','+y1,ax+pd,ay+ahs-pd,tf,ts,cf,'left','bottom');
  oText(ctx,x1+','+y1,ax+aws-pd,ay+ahs-pd,tf,ts,cf,'right','bottom');
  if(barPx>0){
    var pf='bold '+pSz+'px Arial',ptx=barPx+'px';
    if(barType==='letterbox'){var bh2=Math.round((contH-fh)/2)*sc;oText(ctx,ptx,cssW/2,csy+bh2/2,tf,ts,pf,'center','middle');oText(ctx,ptx,cssW/2,ay+ahs+bh2/2,tf,ts,pf,'center','middle');}
    else{var bw2=Math.round((contW-fw)/2)*sc;oText(ctx,ptx,csx+bw2/2,cssH/2,tf,ts,pf,'center','middle');oText(ctx,ptx,ax+aws+bw2/2,cssH/2,tf,ts,pf,'center','middle');}
  }
}

function drawResult(canvas,r,drawW){
  drawCanvas(canvas,r.base.w,r.base.h,r.cont.w,r.cont.h,r.fit.w,r.fit.h,r.fit.w+'\u00D7'+r.fit.h,r.fit.barType,r.fit.barPx,drawW);
}

function buildLayout(){
  var out=document.getElementById('layout-out');
  if(!state.results.length){out.innerHTML='<p class="eb">❌ Invalid aspect ratio.</p>';return;}
  var multi=state.results.length>1,html=multi?'<div class="rg">':'<div>';
  state.results.forEach(function(r,i){
    var fit=r.fit,cont=r.cont,base=r.base,coords=activeCoords(r);
    var cf=((fit.w*fit.h)/(cont.w*cont.h)*100).toFixed(1),actual=(fit.w/fit.h).toFixed(6);
    var ffr='';
    if(r.fmt!=='full'){var ff=((fit.w*fit.h)/(base.w*base.h)*100).toFixed(1);ffr='<div class="sr"><span class="sk">Full container fill</span><span class="sv">'+ff+'%</span></div>';}
    var comp='';
    if(fit.w%2!==0)comp+='<div class="wb">⚠️ Width not even</div>';
    if(fit.h%2!==0)comp+='<div class="wb">⚠️ Height not even</div>';
    if(!comp)comp=fit.barPx===0?'<div class="ob">✅ Exact fit — no bars needed</div>':'<div class="ob">✅ DCI compliant</div>';
    html+=
      '<div class="card">'+
        '<div class="ct">'+base.label+' — '+base.w+'&times;'+base.h+'</div>'+
        '<div class="cw" id="wrap-'+i+'"><canvas id="cv-'+i+'"></canvas></div>'+
        '<hr>'+
        '<div class="sr"><span class="sk">Container</span><span class="sv">'+cont.w+'&times;'+cont.h+'</span></div>'+
        '<div class="sr"><span class="sk">Active size</span><span class="sv">'+fit.w+'&times;'+fit.h+' px</span></div>'+
        '<div class="sr"><span class="sk">Bar type</span><span class="sv">'+fit.barType+'</span></div>'+
        '<div class="sr"><span class="sk">Bar each side</span><span class="sv">'+fit.barPx+' px</span></div>'+
        '<div class="sr"><span class="sk">Total bars</span><span class="sv">'+(fit.barPx*2)+' px</span></div>'+
        '<div class="sr"><span class="sk">Container fill</span><span class="sv">'+cf+'%</span></div>'+
        ffr+
        '<div class="sr"><span class="sk">Target ratio</span><span class="sv">'+r.ratioVal.toFixed(6)+'</span></div>'+
        '<div class="sr"><span class="sk">Actual ratio</span><span class="sv">'+actual+'</span></div>'+
        '<div class="sr"><span class="sk">Coords (full frame)</span><span class="sv">'+coords.x0+','+coords.y0+' &rarr; '+coords.x1+','+coords.y1+'</span></div>'+
        comp+
        '<div class="ar">'+
          '<button class="ab" data-dl="'+i+'">⬇️ PNG</button>'+
          '<button class="ab" data-cpstats="'+i+'">📋 Stats</button>'+
        '</div>'+
      '</div>';
  });
  html+='</div>';
  out.innerHTML=html;
  requestAnimationFrame(function(){requestAnimationFrame(function(){
    state.results.forEach(function(r,i){
      var wrap=document.getElementById('wrap-'+i),cv=document.getElementById('cv-'+i);
      if(!wrap||!cv)return;
      var drawW=Math.floor(wrap.getBoundingClientRect().width||wrap.offsetWidth||400);
      try{drawResult(cv,r,drawW);}catch(e){console.error(e);}
      (function(idx){cv.onclick=function(){openModal(idx);};}(i));
    });
  });});
}

function xmlPlain(r){
  var g=gcd(r.fit.w,r.fit.h),c=activeCoords(r);
  return['<!-- '+r.base.label+' '+r.base.w+'x'+r.base.h+' -->',
    '<MainPictureActiveArea>',
    '  <ScreenAspectRatio>'+(r.fit.w/g)+' '+(r.fit.h/g)+'</ScreenAspectRatio>',
    '  <ActiveAreaTopEdge>'+c.y0+'</ActiveAreaTopEdge>',
    '  <ActiveAreaBottomEdge>'+c.y1+'</ActiveAreaBottomEdge>',
    '  <ActiveAreaLeftEdge>'+c.x0+'</ActiveAreaLeftEdge>',
    '  <ActiveAreaRightEdge>'+c.x1+'</ActiveAreaRightEdge>',
    '</MainPictureActiveArea>'].join('\n');
}

function xmlHighlight(plain){
  return plain.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^([ ]*&lt;!--.*?--&gt;)/gm,'<span class="xc">$1</span>')
    .replace(/(&lt;\/?[A-Za-z][A-Za-z0-9]*&gt;)/g,'<span class="xt">$1</span>')
    .replace(/&gt;(\d[^&\n]*)&lt;\//g,'&gt;<span class="xv">$1</span>&lt;\/');
}

function buildXML(){
  var out=document.getElementById('xml-out');
  if(!state.results.length){out.innerHTML='';return;}
  var html='';
  state.results.forEach(function(r,i){
    html+='<div class="xp">'+xmlHighlight(xmlPlain(r))+'</div>'+
      '<div class="ar" style="margin-bottom:1em"><button class="ab p" data-cpxml="'+i+'">📋 Copy '+r.resKey.toUpperCase()+' XML</button></div>';
  });
  out.innerHTML=html;
}

function buildReverse(){
  var wVal=parseInt(document.getElementById('rev-w').value,10);
  var hVal=parseInt(document.getElementById('rev-h').value,10);
  var out=document.getElementById('rev-out');
  if(!wVal||!hVal||wVal<=0||hVal<=0){out.innerHTML='';return;}
  var ratio=wVal/hVal,g=gcd(wVal,hVal),fmt=document.getElementById('container').value,rows='';
  ['2k','4k'].forEach(function(rk){
    var base=RES[rk],cont=getContainer(fmt,rk),fit=getFit(cont.w,cont.h,ratio);
    var cF=((wVal*hVal)/(cont.w*cont.h)*100).toFixed(1),fF=((wVal*hVal)/(base.w*base.h)*100).toFixed(1);
    var fs=fmt!=='full'?cF+'% cont / '+fF+'% full':cF+'%';
    rows+='<div class="rr"><strong>'+rk.toUpperCase()+'</strong> '+cont.w+'&times;'+cont.h+' &rarr; '+fit.barPx+'px '+fit.barType+' — '+fs+'</div>';
  });
  var frac=(wVal/g)<=100?(wVal/g)+':'+(hVal/g)+' — ':'';
  out.innerHTML='<div class="card" style="margin-top:.75em">'+
    '<span class="br">'+ratio.toFixed(4)+':1</span>'+
    '<div style="opacity:.6;font-size:.83em;margin-bottom:.75em">'+frac+wVal+'&times;'+hVal+' px</div>'+
    rows+
    '<div class="ar" style="margin-top:.75em"><button class="ab p" id="urb">Use this ratio &rarr;</button></div>'+
    '</div>';
  document.getElementById('urb').onclick=function(){document.getElementById('ratio').value=ratio.toFixed(4);runCalc();activateTab('layout');};
}

function runCalc(){
  var raw=document.getElementById('ratio').value;
  var rv=parseRatio(raw);
  var fmt=document.getElementById('container').value;
  var rp=document.getElementById('resolution').value;
  try{localStorage.setItem('dci_ratio',raw);localStorage.setItem('dci_fmt',fmt);localStorage.setItem('dci_res',rp);}catch(e){}
  try{history.replaceState(null,'','#r='+encodeURIComponent(raw)+'&f='+fmt+'&res='+rp);}catch(e){}
  document.querySelectorAll('.pb').forEach(function(b){b.classList.toggle('active',rv!==null&&Math.abs(parseFloat(b.dataset.v)-rv)<0.0001);});
  if(!rv){state.results=[];buildLayout();buildXML();return;}
  var keys=rp==='both'?['2k','4k']:rp==='2k'?['2k']:['4k'];
  state.results=keys.map(function(rk){
    var base=RES[rk],cont=getContainer(fmt,rk),fit=getFit(cont.w,cont.h,rv);
    var known=findKnownArea(rv,rk);
    if(known&&known.w<=cont.w&&known.h<=cont.h){
      fit.w=known.w;fit.h=known.h;
      if(cont.w>fit.w){fit.barType='pillarbox';fit.barPx=Math.round((cont.w-fit.w)/2);}
      else if(cont.h>fit.h){fit.barType='letterbox';fit.barPx=Math.round((cont.h-fit.h)/2);}
      else{fit.barType='letterbox';fit.barPx=0;}
    }
    return{resKey:rk,base:base,cont:cont,fit:fit,fmt:fmt,ratioVal:rv};
  });
  buildLayout();buildXML();
}

function redrawAll(){
  state.results.forEach(function(r,i){
    var wrap=document.getElementById('wrap-'+i),cv=document.getElementById('cv-'+i);
    if(!wrap||!cv)return;
    var drawW=Math.floor(wrap.getBoundingClientRect().width||wrap.offsetWidth||400);
    try{drawResult(cv,r,drawW);}catch(e){}
  });
}
window.addEventListener('resize',function(){cancelAnimationFrame(state.resizeRaf);state.resizeRaf=requestAnimationFrame(redrawAll);});

function openModal(idx){
  var r=state.results[idx];if(!r)return;
  document.getElementById('modal').classList.add('open');document.body.style.overflow='hidden';
  var vw=Math.min(window.innerWidth-32,1400),vh=Math.min(window.innerHeight-32,900);
  var asp=r.base.w/r.base.h,mw=vw,mh=vw/asp;
  if(mh>vh){mh=vh;mw=vh*asp;}
  try{drawResult(document.getElementById('mc'),r,Math.floor(mw));}catch(e){}
}
document.getElementById('modal').addEventListener('click',function(){document.getElementById('modal').classList.remove('open');document.body.style.overflow='';});
document.addEventListener('keydown',function(e){if(e.key==='Escape'){document.getElementById('modal').classList.remove('open');document.body.style.overflow='';}});

function toast(msg){
  var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  clearTimeout(state.toastTimer);state.toastTimer=setTimeout(function(){el.classList.remove('show');},2200);
}

document.getElementById('layout-out').addEventListener('click',function(e){
  var btn=e.target.closest('button');if(!btn)return;
  var idx=parseInt(btn.getAttribute('data-dl')!==null?btn.getAttribute('data-dl'):btn.getAttribute('data-cpstats'),10);
  var r=state.results[idx];if(!r)return;
  if(btn.hasAttribute('data-dl')){
    var tmp=document.createElement('canvas');
    try{drawResult(tmp,r,Math.round(r.base.w/4));}catch(e){return;}
    var a=document.createElement('a');a.download='dci-'+r.resKey+'-'+r.fit.w+'x'+r.fit.h+'.png';a.href=tmp.toDataURL('image/png');a.click();
    toast('PNG downloaded');
  }
  if(btn.hasAttribute('data-cpstats')){
    var coords=activeCoords(r),cf=((r.fit.w*r.fit.h)/(r.cont.w*r.cont.h)*100).toFixed(1),fl='';
    if(r.fmt!=='full')fl='\nFull fill  : '+((r.fit.w*r.fit.h)/(r.base.w*r.base.h)*100).toFixed(1)+'%';
    var txt=['DCI '+r.resKey.toUpperCase()+' Layout','Full frame : '+r.base.w+' x '+r.base.h,'Container  : '+r.cont.w+' x '+r.cont.h,'Active     : '+r.fit.w+' x '+r.fit.h,'Bar type   : '+r.fit.barType,'Bar size   : '+r.fit.barPx+' px each side','Cont fill  : '+cf+'%'+fl,'Coords     : '+coords.x0+','+coords.y0+' -> '+coords.x1+','+coords.y1,'Ratio      : '+r.ratioVal.toFixed(4)].join('\n');
    navigator.clipboard.writeText(txt).then(function(){toast('Stats copied!');}).catch(function(){toast('Copy failed');});
  }
});

document.getElementById('xml-out').addEventListener('click',function(e){
  var btn=e.target.closest('button');if(!btn||!btn.hasAttribute('data-cpxml'))return;
  var r=state.results[parseInt(btn.getAttribute('data-cpxml'),10)];if(!r)return;
  navigator.clipboard.writeText(xmlPlain(r)).then(function(){toast('XML copied!');}).catch(function(){toast('Copy failed');});
});

function activateTab(name){
  document.querySelectorAll('.tb').forEach(function(b){b.classList.toggle('active',b.getAttribute('data-tab')===name);});
  document.querySelectorAll('.tp').forEach(function(p){p.classList.toggle('active',p.id==='pane-'+name);});
}
document.querySelectorAll('.tb').forEach(function(b){b.addEventListener('click',function(){activateTab(b.getAttribute('data-tab'));});});

document.getElementById('themeBtn').addEventListener('click',function(){
  document.body.classList.toggle('light');var l=document.body.classList.contains('light');
  this.textContent=l?'☀️':'🌙';try{localStorage.setItem('dci_theme',l?'light':'dark');}catch(e){}
  redrawAll();
});

document.getElementById('shareBtn').addEventListener('click',function(){
  if(navigator.share){navigator.share({title:'DCI Calc',url:window.location.href}).catch(function(){});}
  else{navigator.clipboard.writeText(window.location.href).then(function(){toast('URL copied!');}).catch(function(){toast('Copy failed');});}
});

(function(){
  var bar=document.getElementById('ibar'),msg=document.getElementById('imsg');
  var ibtn=document.getElementById('ibtn'),dis=document.getElementById('idismiss');
  var isSA=window.navigator.standalone===true||window.matchMedia('(display-mode: standalone)').matches;
  if(isSA)return;
  try{if(localStorage.getItem('install-dismissed')==='1')return;}catch(e){}
  var isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent.toLowerCase())&&!window.MSStream;
  if(isIOS){
    msg.innerHTML='📲 Tap <strong>Share ⬆️</strong> then <strong>Add to Home Screen</strong>';
    bar.classList.add('show');
    dis.addEventListener('click',function(){bar.classList.remove('show');try{localStorage.setItem('install-dismissed','1');}catch(e){}});
  }else{
    window.addEventListener('beforeinstallprompt',function(e){
      e.preventDefault();state.deferredPWA=e;
      msg.textContent='📲 Add DCI Calc to your home screen for offline use';
      ibtn.style.display='';bar.classList.add('show');
    });
    ibtn.addEventListener('click',function(){
      if(!state.deferredPWA)return;
      state.deferredPWA.prompt();
      state.deferredPWA.userChoice.then(function(res){state.deferredPWA=null;bar.classList.remove('show');if(res.outcome==='accepted')toast('App installed! ✅');});
    });
    dis.addEventListener('click',function(){bar.classList.remove('show');try{localStorage.setItem('install-dismissed','1');}catch(e){}});
    window.addEventListener('appinstalled',function(){bar.classList.remove('show');toast('App installed! ✅');});
  }
}());

(function(){
  var row=document.getElementById('presets');
  PRESETS.forEach(function(p){
    var btn=document.createElement('button');btn.className='pb';btn.textContent=p.label;btn.dataset.v=p.v;
    btn.addEventListener('click',function(){document.getElementById('ratio').value=p.v;runCalc();});
    row.appendChild(btn);
  });
}());

function debounce(fn,ms){var t;return function(){clearTimeout(t);t=setTimeout(fn,ms);};}
document.getElementById('ratio').addEventListener('input',debounce(runCalc,280));
document.getElementById('container').addEventListener('change',runCalc);
document.getElementById('resolution').addEventListener('change',runCalc);
document.getElementById('ratio').addEventListener('focus',function(){this.select();});
document.getElementById('rev-w').addEventListener('input',debounce(buildReverse,300));
document.getElementById('rev-h').addEventListener('input',debounce(buildReverse,300));

(function(){
  try{if(localStorage.getItem('dci_theme')==='light'){document.body.classList.add('light');document.getElementById('themeBtn').textContent='☀️';}}catch(e){}
  var params=new URLSearchParams(window.location.hash.slice(1));
  function ls(k){try{return localStorage.getItem(k);}catch(e){return null;}}
  document.getElementById('ratio').value=params.get('r')||ls('dci_ratio')||'2.39';
  document.getElementById('container').value=params.get('f')||ls('dci_fmt')||'full';
  document.getElementById('resolution').value=params.get('res')||ls('dci_res')||'both';
  runCalc();
}());
</script>
