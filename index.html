<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DCI Aspect Ratio Calculator</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DCI Calc">
<meta name="theme-color" content="#0a0a0a">
<style>
:root {
  --bg: #0a0a0a; --fg: #ffffff; --accent: #00ff88;
  --card: #111111; --input-bg: #1a1a1a; --border: #2a2a2a;
  --warn: #ffaa00; --err: #ff5555; --ok: #00ff88;
}
body.light {
  --bg: #f0f0f0; --fg: #111111; --accent: #0055cc;
  --card: #ffffff; --input-bg: #e4e4e4; --border: #cccccc;
  --warn: #bb6600; --err: #cc0000; --ok: #007744;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--fg);
  font-family: Arial, sans-serif; min-height: 100vh;
  overscroll-behavior: none;
}
#header {
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 0.7em 1em; padding-top: max(0.7em, env(safe-area-inset-top));
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
}
#header h1 { color: var(--accent); font-size: 1.15em; }
#header-btns { display: flex; gap: 0.5em; }
#main {
  max-width: 980px; margin: 0 auto; padding: 1em;
  padding-bottom: max(1em, env(safe-area-inset-bottom));
}
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 1em; margin-bottom: 1em;
}
.card-title {
  font-size: 0.75em; font-weight: bold; text-transform: uppercase;
  letter-spacing: 0.09em; color: var(--accent); margin-bottom: 0.7em;
}
.ctrl-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.75em; }
@media (max-width: 580px) { .ctrl-grid { grid-template-columns: 1fr; } }
.ctrl-label {
  font-size: 0.78em; font-weight: bold; text-transform: uppercase;
  letter-spacing: 0.05em; opacity: 0.7; display: flex;
  flex-direction: column; gap: 0.3em;
}
input[type=text], select {
  width: 100%; padding: 0.5em 0.6em; font-size: 1em;
  background: var(--input-bg); color: var(--fg);
  border: 1px solid var(--border); border-radius: 5px;
  font-weight: normal; text-transform: none;
  letter-spacing: normal; opacity: 1; min-height: 44px;
}
input[type=text]:focus, select:focus { outline: none; border-color: var(--accent); }
.presets { display: flex; flex-wrap: wrap; gap: 0.4em; margin-top: 0.8em; }
.preset-btn {
  background: var(--input-bg); border: 1px solid var(--border);
  color: var(--fg); padding: 0.4em 0.75em; font-size: 0.83em;
  border-radius: 20px; cursor: pointer; min-height: 36px;
}
.preset-btn.active, .preset-btn:hover {
  background: var(--accent); color: #000; border-color: var(--accent);
}
.tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 1em; }
.tab-btn {
  background: none; border: none; border-bottom: 3px solid transparent;
  color: var(--fg); padding: 0.65em 1em; font-size: 0.92em;
  cursor: pointer; opacity: 0.5; margin-bottom: -2px; min-height: 44px;
}
.tab-btn.active { opacity: 1; border-bottom-color: var(--accent); font-weight: bold; }
.tab-pane { display: none; }
.tab-pane.active { display: block; }
.results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1em; }
@media (max-width: 580px) { .results-grid { grid-template-columns: 1fr; } }
.canvas-wrap { margin: 0.5em 0; }
canvas {
  display: block; width: 100%; height: auto;
  border: 1px solid var(--border); border-radius: 4px; cursor: zoom-in;
}
.stat-row {
  display: flex; justify-content: space-between;
  padding: 0.32em 0; border-bottom: 1px solid var(--border); font-size: 0.88em;
}
.stat-row:last-child { border-bottom: none; }
.stat-key { opacity: 0.6; }
.stat-val { font-weight: bold; }
.warn-box {
  margin-top: 0.5em; padding: 0.35em 0.55em; border-radius: 4px;
  font-size: 0.83em; border-left: 3px solid var(--warn);
  background: rgba(255,170,0,0.09); color: var(--warn);
}
.ok-box {
  margin-top: 0.5em; padding: 0.35em 0.55em; border-radius: 4px;
  font-size: 0.83em; border-left: 3px solid var(--ok);
  background: rgba(0,255,136,0.07); color: var(--ok);
}
.err-box { color: var(--err); font-weight: bold; padding: 0.5em 0; }
.act-row { display: flex; flex-wrap: wrap; gap: 0.45em; margin-top: 0.7em; }
.act-btn {
  flex: 1; min-width: 90px; min-height: 44px;
  background: var(--input-bg); border: 1px solid var(--border);
  color: var(--fg); padding: 0.5em 0.7em; font-size: 0.85em;
  border-radius: 5px; cursor: pointer;
}
.act-btn:hover { border-color: var(--accent); color: var(--accent); }
.act-btn.primary {
  background: var(--accent); color: #000;
  border-color: var(--accent); font-weight: bold;
}
.xml-pre {
  background: var(--input-bg); border: 1px solid var(--border);
  border-radius: 5px; padding: 0.75em; font-family: monospace;
  font-size: 0.8em; white-space: pre; overflow-x: auto;
  line-height: 1.65; margin: 0.5em 0 0.75em;
}
.xt { color: #6ab0f5; } .xv { color: #f0c060; } .xc { color: #888; }
.rev-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75em; }
@media (max-width: 480px) { .rev-grid { grid-template-columns: 1fr; } }
.big-ratio {
  font-size: 2em; font-weight: bold; color: var(--accent);
  display: block; margin: 0.2em 0 0.1em;
}
.rev-row {
  font-size: 0.87em; margin-bottom: 0.35em;
  padding: 0.25em 0; border-bottom: 1px solid var(--border);
}
#modal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.93); z-index: 200;
  align-items: center; justify-content: center; padding: 1em;
}
#modal.open { display: flex; }
#modal-canvas { max-width: 100%; max-height: 90vh; cursor: zoom-out; }
#toast {
  position: fixed; bottom: max(1.5em, env(safe-area-inset-bottom));
  left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--accent); color: #000; padding: 0.5em 1.2em;
  border-radius: 20px; font-weight: bold; font-size: 0.9em;
  z-index: 300; opacity: 0; transition: transform 0.28s, opacity 0.28s;
  pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.icon-btn {
  background: none; border: 1px solid var(--border); color: var(--fg);
  padding: 0.4em 0.75em; font-size: 0.95em; border-radius: 5px;
  cursor: pointer; min-height: 44px;
}
.icon-btn:hover { border-color: var(--accent); }
hr { border: none; border-top: 1px solid var(--border); margin: 0.7em 0; }
#install-bar {
  display: none; background: var(--card); border-bottom: 1px solid var(--border);
  padding: 0.6em 1em; padding-top: max(0.6em, env(safe-area-inset-top));
  align-items: center; justify-content: space-between;
  gap: 0.75em; font-size: 0.88em;
}
#install-bar.show { display: flex; }
#install-bar button {
  background: var(--accent); color: #000; border: none;
  padding: 0.4em 1em; border-radius: 5px; font-weight: bold;
  cursor: pointer; white-space: nowrap; min-height: 36px;
}
#install-bar-dismiss {
  background: none !important; color: var(--fg) !important;
  opacity: 0.5; font-weight: normal !important;
}
</style>
</head>
<body>

<div id="install-bar">
  <span id="install-msg"></span>
  <div style="display:flex;gap:0.5em;flex-shrink:0;">
    <button id="install-btn" style="display:none;">Install</button>
    <button id="install-bar-dismiss">✕</button>
  </div>
</div>

<div id="header">
  <h1>🎬 DCI Calc</h1>
  <div id="header-btns">
    <button class="icon-btn" id="shareBtn">🔗 Share</button>
    <button class="icon-btn" id="themeBtn">🌙</button>
  </div>
</div>

<div id="main">
  <div class="card">
    <div class="card-title">Settings</div>
    <div class="ctrl-grid">
      <label class="ctrl-label">Aspect Ratio
        <input type="text" id="ratio" placeholder="e.g. 2.39 or 16:9"
               autocomplete="off" spellcheck="false" inputmode="decimal">
      </label>
      <label class="ctrl-label">Container
        <select id="container">
          <option value="full">Full  (2048×1080 / 4096×2160)</option>
          <option value="flat">Flat  (1998×1080 / 3996×2160)</option>
          <option value="scope">Scope (2048×858  / 4096×1718)</option>
        </select>
      </label>
      <label class="ctrl-label">Resolution
        <select id="resolution">
          <option value="both">Both 2K &amp; 4K</option>
          <option value="2k">2K only</option>
          <option value="4k">4K only</option>
        </select>
      </label>
    </div>
    <div class="card-title" style="margin-top:1em;margin-bottom:0.4em;">Quick Presets</div>
    <div class="presets" id="presets"></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="layout">📐 Layout</button>
    <button class="tab-btn"        data-tab="xml">📄 DCP XML</button>
    <button class="tab-btn"        data-tab="reverse">🔄 Reverse</button>
  </div>

  <div class="tab-pane active" id="pane-layout">
    <div id="layout-out"></div>
  </div>

  <div class="tab-pane" id="pane-xml">
    <div class="card">
      <div class="card-title">SMPTE 429-8 — MainPictureActiveArea</div>
      <p style="font-size:0.83em;opacity:0.6;margin-bottom:0.5em;">
        Ready-to-paste XML for your DCP composition playlist.
      </p>
      <div id="xml-out"></div>
    </div>
  </div>

  <div class="tab-pane" id="pane-reverse">
    <div class="card">
      <div class="card-title">Reverse Lookup — Pixels → Ratio</div>
      <p style="font-size:0.83em;opacity:0.6;margin-bottom:0.75em;">
        Enter your active frame dimensions to find the aspect ratio and bar sizes.
      </p>
      <div class="rev-grid">
        <label class="ctrl-label">Width (px)
          <input type="text" id="rev-w" placeholder="e.g. 1998"
                 autocomplete="off" inputmode="numeric">
        </label>
        <label class="ctrl-label">Height (px)
          <input type="text" id="rev-h" placeholder="e.g. 1080"
                 autocomplete="off" inputmode="numeric">
        </label>
      </div>
      <div id="rev-out"></div>
    </div>
  </div>
</div>

<div id="modal"><canvas id="modal-canvas"></canvas></div>
<div id="toast"></div>

<script>
/* ── Constants ── */
var PRESETS = [
  { label:'1.33  Academy',    v:'1.33' },
  { label:'1.43  IMAX',       v:'1.43' },
  { label:'1.78  16:9',       v:'1.78' },
  { label:'1.85  Flat',       v:'1.85' },
  { label:'2.00  Univisium',  v:'2.00' },
  { label:'2.20  Todd-AO',    v:'2.20' },
  { label:'2.39  Scope',      v:'2.39' },
  { label:'2.76  Ultra Pana', v:'2.76' },
];

var RES = {
  '2k': { w:2048, h:1080, label:'DCI 2K' },
  '4k': { w:4096, h:2160, label:'DCI 4K' },
};

var CONTAINERS = {
  'full':  { '2k': { w:2048, h:1080 }, '4k': { w:4096, h:2160 } },
  'flat':  { '2k': { w:1998, h:1080 }, '4k': { w:3996, h:2160 } },
  'scope': { '2k': { w:2048, h:858  }, '4k': { w:4096, h:1718 } },
};

/*
  RATIO_EPS: tolerance for "is the container already the right ratio"
  SNAP_EPS:  tolerance for snapping to a known DCI active area
             4096/1718 = 2.3841, vs 2.39 → diff 0.0059, needs > 0.005
*/
var RATIO_EPS = 0.005;
var SNAP_EPS  = 0.01;

/* ── State ── */
var state = { results:[], resizeRaf:null, toastTimer:null, deferredPWA:null };

/* ── Math ── */
function parseRatio(raw) {
  var s = raw.trim().replace(/[^0-9.:/]/g,'');
  if (!s) return null;
  var sep = s.indexOf(':') >= 0 ? ':' : s.indexOf('/') >= 0 ? '/' : null;
  if (sep) {
    var p = s.split(sep).map(Number);
    return (p.length===2 && p[0]>0 && p[1]>0 && !isNaN(p[0]) && !isNaN(p[1]))
      ? p[0]/p[1] : null;
  }
  var n = parseFloat(s);
  return (n>0 && !isNaN(n)) ? n : null;
}

function gcd(a,b) { return b===0 ? a : gcd(b, a%b); }

function getContainer(fmt, rk) { return CONTAINERS[fmt][rk]; }

/*
  If ratio is within SNAP_EPS of a known DCI container format
  (flat or scope), return those hardcoded dimensions.
  This ensures 2.39 in Full 4K gives 4096×1718, not 4096×1714.
*/
function findKnownArea(ratio, rk) {
  var fmts = ['flat','scope'];
  for (var i=0; i<fmts.length; i++) {
    var c = CONTAINERS[fmts[i]][rk];
    if (Math.abs(ratio - c.w/c.h) < SNAP_EPS) return { w:c.w, h:c.h };
  }
  return null;
}

/*
  Fit content into container.
  Uses ceiling-to-even so 2048/2.39=856.9 → 858 (not 856).
  Epsilon branch handles containers already matching the ratio.
*/
function getFit(cw, ch, ratio) {
  var cr = cw/ch;
  var w, h, barType, barPx;
  if (cr > ratio + RATIO_EPS) {
    h=ch; w=Math.min(Math.ceil(h*ratio/2)*2, cw);
    barType='pillarbox'; barPx=Math.round((cw-w)/2);
  } else if (cr < ratio - RATIO_EPS) {
    w=cw; h=Math.min(Math.ceil(w/ratio/2)*2, ch);
    barType='letterbox'; barPx=Math.round((ch-h)/2);
  } else {
    w=cw; h=ch; barType='letterbox'; barPx=0;
  }
  return { w:w, h:h, barType:barType, barPx:barPx };
}

/* Full-frame coordinates. x1/y1 = last pixel index. */
function activeCoords(r) {
  var cox = Math.round((r.base.w - r.cont.w)/2);
  var coy = Math.round((r.base.h - r.cont.h)/2);
  var x0  = cox + Math.round((r.cont.w - r.fit.w)/2);
  var y0  = coy + Math.round((r.cont.h - r.fit.h)/2);
  return { x0:x0, y0:y0, x1:x0+r.fit.w-1, y1:y0+r.fit.h-1 };
}

/* ── Canvas ── */
function stripePattern(ctx, rgba) {
  var p=document.createElement('canvas'); p.width=p.height=14;
  var g=p.getContext('2d'); g.strokeStyle=rgba; g.lineWidth=4;
  g.beginPath(); g.moveTo(0,14); g.lineTo(14,0); g.stroke();
  return ctx.createPattern(p,'repeat');
}

function oText(ctx,txt,x,y,fill,stk,font,align,base) {
  ctx.save();
  ctx.font=font; ctx.textAlign=align; ctx.textBaseline=base;
  ctx.lineWidth=3; ctx.strokeStyle=stk; ctx.strokeText(txt,x,y);
  ctx.fillStyle=fill; ctx.fillText(txt,x,y);
  ctx.restore();
}

function drawCanvas(canvas, baseW, baseH, contW, contH,
                    fw, fh, label, barType, barPx, drawW) {
  var dpr=window.devicePixelRatio||1;
  var cssW=drawW, cssH=Math.round(cssW*baseH/baseW);
  canvas.width=cssW*dpr; canvas.height=cssH*dpr;
  canvas.style.width=cssW+'px'; canvas.style.height=cssH+'px';
  var ctx=canvas.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  var isLight=document.body.classList.contains('light');
  ctx.fillStyle=isLight?'#d8d8d8':'#0a0a0a';
  ctx.fillRect(0,0,cssW,cssH);
  var sc=Math.min(cssW/baseW, cssH/baseH);
  var ox=(cssW-baseW*sc)/2, oy=(cssH-baseH*sc)/2;
  /* full frame */
  ctx.strokeStyle=isLight?'#999':'#444'; ctx.lineWidth=1;
  ctx.strokeRect(ox,oy,baseW*sc,baseH*sc);
  /* container offset */
  var cox=Math.round((baseW-contW)/2), coy=Math.round((baseH-contH)/2);
  var csx=ox+cox*sc, csy=oy+coy*sc;
  /* dashed sub-container */
  if (contW!==baseW || contH!==baseH) {
    ctx.save(); ctx.strokeStyle=isLight?'#bbb':'#555';
    ctx.lineWidth=1; ctx.setLineDash([4,4]);
    ctx.strokeRect(csx,csy,contW*sc,contH*sc); ctx.restore();
  }
  /* active area offset */
  var aox=cox+Math.round((contW-fw)/2), aoy=coy+Math.round((contH-fh)/2);
  var ax=ox+aox*sc, ay=oy+aoy*sc, aws=fw*sc, ahs=fh*sc;
  /* bars */
  var bCol=barType==='letterbox'?'rgba(80,120,255,0.45)':'rgba(220,60,60,0.45)';
  ctx.fillStyle=stripePattern(ctx,bCol);
  if (barType==='letterbox') {
    var bh=Math.round((contH-fh)/2)*sc;
    if (bh>0) { ctx.fillRect(csx,csy,contW*sc,bh); ctx.fillRect(csx,ay+ahs,contW*sc,bh); }
  } else {
    var bw=Math.round((contW-fw)/2)*sc;
    if (bw>0) { ctx.fillRect(csx,csy,bw,contH*sc); ctx.fillRect(ax+aws,csy,bw,contH*sc); }
  }
  /* active fill */
  ctx.globalAlpha=0.82; ctx.fillStyle='#00bb60';
  ctx.fillRect(ax,ay,aws,ahs); ctx.globalAlpha=1;
  ctx.strokeStyle='#00ff88'; ctx.lineWidth=1.5;
  ctx.strokeRect(ax,ay,aws,ahs);
  /* fonts */
  var cSz=Math.max(aws/30,8), pSz=Math.max(aws/24,9);
  var lSz=Math.max(Math.min(aws/(label.length*0.6),ahs*0.22),10);
  var ts='rgba(0,0,0,0.75)', tf='#ffffff';
  /* center label */
  oText(ctx,label,cssW/2,cssH/2,tf,ts,'bold '+lSz+'px Arial','center','middle');
  /* corners — full-frame coords, last pixel index */
  var x0=aox,y0=aoy,x1=x0+fw-1,y1=y0+fh-1;
  var cf='bold '+cSz+'px Arial', pd=4;
  oText(ctx,x0+','+y0, ax+pd,    ay+pd,    tf,ts,cf,'left', 'top');
  oText(ctx,x1+','+y0, ax+aws-pd,ay+pd,    tf,ts,cf,'right','top');
  oText(ctx,x0+','+y1, ax+pd,    ay+ahs-pd,tf,ts,cf,'left', 'bottom');
  oText(ctx,x1+','+y1, ax+aws-pd,ay+ahs-pd,tf,ts,cf,'right','bottom');
  /* bar labels */
  if (barPx>0) {
    var pf='bold '+pSz+'px Arial', ptx=barPx+'px';
    if (barType==='letterbox') {
      var bh2=Math.round((contH-fh)/2)*sc;
      oText(ctx,ptx,cssW/2,csy+bh2/2,    tf,ts,pf,'center','middle');
      oText(ctx,ptx,cssW/2,ay+ahs+bh2/2, tf,ts,pf,'center','middle');
    } else {
      var bw2=Math.round((contW-fw)/2)*sc;
      oText(ctx,ptx,csx+bw2/2,    cssH/2,tf,ts,pf,'center','middle');
      oText(ctx,ptx,ax+aws+bw2/2, cssH/2,tf,ts,pf,'center','middle');
    }
  }
}

function drawResult(canvas, r, drawW) {
  drawCanvas(canvas, r.base.w, r.base.h, r.cont.w, r.cont.h,
    r.fit.w, r.fit.h, r.fit.w+'\u00D7'+r.fit.h,
    r.fit.barType, r.fit.barPx, drawW);
}

/* ── Build Layout ── */
function buildLayout() {
  var out=document.getElementById('layout-out');
  if (!state.results.length) {
    out.innerHTML='<p class="err-box">❌ Invalid aspect ratio.</p>'; return;
  }
  var multi=state.results.length>1;
  var html=multi?'<div class="results-grid">':'<div>';

  state.results.forEach(function(r,i) {
    var fit=r.fit, cont=r.cont, base=r.base, coords=activeCoords(r);
    var contFill=((fit.w*fit.h)/(cont.w*cont.h)*100).toFixed(1);
    var actual=(fit.w/fit.h).toFixed(6);
    var fullFillRow='';
    if (r.fmt!=='full') {
      var ff=((fit.w*fit.h)/(base.w*base.h)*100).toFixed(1);
      fullFillRow='<div class="stat-row"><span class="stat-key">Full container fill</span>'+
        '<span class="stat-val">'+ff+'%</span></div>';
    }
    var comp='';
    if (fit.w%2!==0) comp+='<div class="warn-box">⚠️ Width not even</div>';
    if (fit.h%2!==0) comp+='<div class="warn-box">⚠️ Height not even</div>';
    if (!comp) comp=fit.barPx===0
      ?'<div class="ok-box">✅ Exact fit — no bars needed</div>'
      :'<div class="ok-box">✅ DCI compliant</div>';

    html+=
      '<div class="card">'+
        '<div class="card-title">'+base.label+' — '+base.w+'&times;'+base.h+'</div>'+
        '<div class="canvas-wrap" id="wrap-'+i+'"><canvas id="cv-'+i+'"></canvas></div>'+
        '<hr>'+
        '<div class="stat-row"><span class="stat-key">Container</span>'+
          '<span class="stat-val">'+cont.w+'&times;'+cont.h+'</span></div>'+
        '<div class="stat-row"><span class="stat-key">Active size</span>'+
          '<span class="stat-val">'+fit.w+'&times;'+fit.h+' px</span></div>'+
        '<div class="stat-row"><span class="stat-key">Bar type</span>'+
          '<span class="stat-val">'+fit.barType+'</span></div>'+
        '<div class="stat-row"><span class="stat-key">Bar each side</span>'+
          '<span class="stat-val">'+fit.barPx+' px</span></div>'+
        '<div class="stat-row"><span class="stat-key">Total bars</span>'+
          '<span class="stat-val">'+(fit.barPx*2)+' px</span></div>'+
        '<div class="stat-row"><span class="stat-key">Container fill</span>'+
          '<span class="stat-val">'+contFill+'%</span></div>'+
        fullFillRow+
        '<div class="stat-row"><span class="stat-key">Target ratio</span>'+
          '<span class="stat-val">'+r.ratioVal.toFixed(6)+'</span></div>'+
        '<div class="stat-row"><span class="stat-key">Actual ratio</span>'+
          '<span class="stat-val">'+actual+'</span></div>'+
        '<div class="stat-row"><span class="stat-key">Coords (full frame)</span>'+
          '<span class="stat-val">'+coords.x0+','+coords.y0+' &rarr; '+coords.x1+','+coords.y1+'</span></div>'+
        comp+
        '<div class="act-row">'+
          '<button class="act-btn" data-dl="'+i+'">⬇️ PNG</button>'+
          '<button class="act-btn" data-cpstats="'+i+'">📋 Stats</button>'+
        '</div>'+
      '</div>';
  });

  html+='</div>';
  out.innerHTML=html;

  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      state.results.forEach(function(r,i) {
        var wrap=document.getElementById('wrap-'+i);
        var cv=document.getElementById('cv-'+i);
        if (!wrap||!cv) return;
        var drawW=Math.floor(wrap.getBoundingClientRect().width||wrap.offsetWidth||400);
        try { drawResult(cv,r,drawW); } catch(e) { console.error(e); }
        (function(idx){ cv.onclick=function(){ openModal(idx); }; }(i));
      });
    });
  });
}

/* ── XML ── */
function xmlPlain(r) {
  var g=gcd(r.fit.w,r.fit.h), c=activeCoords(r);
  return [
    '<!-- '+r.base.label+' '+r.base.w+'x'+r.base.h+' -->',
    '<MainPictureActiveArea>',
    '  <ScreenAspectRatio>'+(r.fit.w/g)+' '+(r.fit.h/g)+'</ScreenAspectRatio>',
    '  <ActiveAreaTopEdge>'   +c.y0+'</ActiveAreaTopEdge>',
    '  <ActiveAreaBottomEdge>'+c.y1+'</ActiveAreaBottomEdge>',
    '  <ActiveAreaLeftEdge>'  +c.x0+'</ActiveAreaLeftEdge>',
    '  <ActiveAreaRightEdge>' +c.x1+'</ActiveAreaRightEdge>',
    '</MainPictureActiveArea>',
  ].join('\n');
}

function xmlHighlight(plain) {
  return plain
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^([ ]*&lt;!--.*?--&gt;)/gm,'<span class="xc">$1</span>')
    .replace(/(&lt;\/?[A-Za-z][A-Za-z0-9]*&gt;)/g,'<span class="xt">$1</span>')
    .replace(/&gt;(\d[^&\n]*)&lt;\//g,'&gt;<span class="xv">$1</span>&lt;\/');
}

function buildXML() {
  var out=document.getElementById('xml-out');
  if (!state.results.length) { out.innerHTML=''; return; }
  var html='';
  state.results.forEach(function(r,i) {
    html+='<div class="xml-pre">'+xmlHighlight(xmlPlain(r))+'</div>'+
      '<div class="act-row" style="margin-bottom:1em;">'+
        '<button class="act-btn primary" data-cpxml="'+i+'">📋 Copy '+r.resKey.toUpperCase()+' XML</button>'+
      '</div>';
  });
  out.innerHTML=html;
}

/* ── Reverse Lookup ── */
function buildReverse() {
  var wVal=parseInt(document.getElementById('rev-w').value,10);
  var hVal=parseInt(document.getElementById('rev-h').value,10);
  var out=document.getElementById('rev-out');
  if (!wVal||!hVal||wVal<=0||hVal<=0) { out.innerHTML=''; return; }
  var ratio=wVal/hVal, g=gcd(wVal,hVal);
  var fmt=document.getElementById('container').value;
  var rows='';
  ['2k','4k'].forEach(function(rk) {
    var base=RES[rk], cont=getContainer(fmt,rk), fit=getFit(cont.w,cont.h,ratio);
    var cFill=((wVal*hVal)/(cont.w*cont.h)*100).toFixed(1);
    var fFill=((wVal*hVal)/(base.w*base.h)*100).toFixed(1);
    var fillStr=fmt!=='full'?cFill+'% cont / '+fFill+'% full':cFill+'%';
    rows+='<div class="rev-row"><strong>'+rk.toUpperCase()+'</strong> '+
      cont.w+'&times;'+cont.h+' &rarr; '+fit.barPx+'px '+fit.barType+' — '+fillStr+'</div>';
  });
  var frac=(wVal/g)<=100?(wVal/g)+':'+(hVal/g)+' — ':'';
  out.innerHTML=
    '<div class="card" style="margin-top:0.75em;">'+
      '<span class="big-ratio">'+ratio.toFixed(4)+':1</span>'+
      '<div style="opacity:0.6;font-size:0.83em;margin-bottom:0.75em;">'+frac+wVal+'&times;'+hVal+' px</div>'+
      rows+
      '<div class="act-row" style="margin-top:0.75em;">'+
        '<button class="act-btn primary" id="use-ratio-btn">Use this ratio &rarr;</button>'+
      '</div>'+
    '</div>';
  document.getElementById('use-ratio-btn').onclick=function() {
    document.getElementById('ratio').value=ratio.toFixed(4);
    runCalc(); activateTab('layout');
  };
}

/* ── Main Calc ── */
function runCalc() {
  var rawRatio=document.getElementById('ratio').value;
  var ratioVal=parseRatio(rawRatio);
  var fmt=document.getElementById('container').value;
  var resPick=document.getElementById('resolution').value;

  try {
    localStorage.setItem('dci_ratio',rawRatio);
    localStorage.setItem('dci_fmt',fmt);
    localStorage.setItem('dci_res',resPick);
  } catch(e) {}

  try {
    history.replaceState(null,'',
      '#r='+encodeURIComponent(rawRatio)+'&f='+fmt+'&res='+resPick);
  } catch(e) {}

  document.querySelectorAll('.preset-btn').forEach(function(b) {
    b.classList.toggle('active',
      ratioVal!==null && Math.abs(parseFloat(b.dataset.v)-ratioVal)<0.0001);
  });

  if (!ratioVal) { state.results=[]; buildLayout(); buildXML(); return; }

  var keys=resPick==='both'?['2k','4k']:resPick==='2k'?['2k']:['4k'];

  state.results=keys.map(function(rk) {
    var base=RES[rk];
    var cont=getContainer(fmt,rk);
    var fit=getFit(cont.w,cont.h,ratioVal);

    /*
      Snap to known DCI active area dimensions if the ratio matches
      a standard format. This corrects cases like 2.39 in Full 4K
      which maths to 4096×1714 but should be 4096×1718.
    */
    var known=findKnownArea(ratioVal,rk);
    if (known && known.w<=cont.w && known.h<=cont.h) {
      fit.w=known.w;
      fit.h=known.h;
      if (cont.w>fit.w) {
        fit.barType='pillarbox';
        fit.barPx=Math.round((cont.w-fit.w)/2);
      } else if (cont.h>fit.h) {
        fit.barType='letterbox';
        fit.barPx=Math.round((cont.h-fit.h)/2);
      } else {
        fit.barType='letterbox';
        fit.barPx=0;
      }
    }

    return { resKey:rk, base:base, cont:cont, fit:fit, fmt:fmt, ratioVal:ratioVal };
  });

  buildLayout();
  buildXML();
}

/* ── Redraw on resize ── */
function redrawAll() {
  state.results.forEach(function(r,i) {
    var wrap=document.getElementById('wrap-'+i);
    var cv=document.getElementById('cv-'+i);
    if (!wrap||!cv) return;
    var drawW=Math.floor(wrap.getBoundingClientRect().width||wrap.offsetWidth||400);
    try { drawResult(cv,r,drawW); } catch(e) {}
  });
}
window.addEventListener('resize',function() {
  cancelAnimationFrame(state.resizeRaf);
  state.resizeRaf=requestAnimationFrame(redrawAll);
});

/* ── Modal ── */
function openModal(idx) {
  var r=state.results[idx]; if (!r) return;
  var modal=document.getElementById('modal');
  var mc=document.getElementById('modal-canvas');
  modal.classList.add('open'); document.body.style.overflow='hidden';
  var vw=Math.min(window.innerWidth-32,1400);
  var vh=Math.min(window.innerHeight-32,900);
  var asp=r.base.w/r.base.h, mw=vw, mh=vw/asp;
  if (mh>vh) { mh=vh; mw=vh*asp; }
  try { drawResult(mc,r,Math.floor(mw)); } catch(e) {}
}
document.getElementById('modal').addEventListener('click',function() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow='';
});
document.addEventListener('keydown',function(e) {
  if (e.key==='Escape') {
    document.getElementById('modal').classList.remove('open');
    document.body.style.overflow='';
  }
});

/* ── Toast ── */
function toast(msg) {
  var el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(state.toastTimer);
  state.toastTimer=setTimeout(function(){ el.classList.remove('show'); },2200);
}

/* ── Event delegation ── */
document.getElementById('layout-out').addEventListener('click',function(e) {
  var btn=e.target.closest('button'); if (!btn) return;
  var idx=parseInt(
    btn.getAttribute('data-dl')!==null
      ? btn.getAttribute('data-dl')
      : btn.getAttribute('data-cpstats'), 10);
  var r=state.results[idx]; if (!r) return;

  if (btn.hasAttribute('data-dl')) {
    var tmp=document.createElement('canvas');
    try { drawResult(tmp,r,Math.round(r.base.w/4)); } catch(e) { return; }
    var a=document.createElement('a');
    a.download='dci-'+r.resKey+'-'+r.fit.w+'x'+r.fit.h+'.png';
    a.href=tmp.toDataURL('image/png'); a.click();
    toast('PNG downloaded');
  }

  if (btn.hasAttribute('data-cpstats')) {
    var coords=activeCoords(r);
    var contFill=((r.fit.w*r.fit.h)/(r.cont.w*r.cont.h)*100).toFixed(1);
    var fullLine='';
    if (r.fmt!=='full') {
      var ff2=((r.fit.w*r.fit.h)/(r.base.w*r.base.h)*100).toFixed(1);
      fullLine='\nFull fill  : '+ff2+'%';
    }
    var txt=[
      'DCI '+r.resKey.toUpperCase()+' Layout',
      'Full frame : '+r.base.w+' x '+r.base.h,
      'Container  : '+r.cont.w+' x '+r.cont.h,
      'Active     : '+r.fit.w+' x '+r.fit.h,
      'Bar type   : '+r.fit.barType,
      'Bar size   : '+r.fit.barPx+' px each side',
      'Cont fill  : '+contFill+'%'+fullLine,
      'Coords     : '+coords.x0+','+coords.y0+' -> '+coords.x1+','+coords.y1,
      'Ratio      : '+r.ratioVal.toFixed(4),
    ].join('\n');
    navigator.clipboard.writeText(txt)
      .then(function(){ toast('Stats copied!'); })
      .catch(function(){ toast('Copy failed'); });
  }
});

document.getElementById('xml-out').addEventListener('click',function(e) {
  var btn=e.target.closest('button');
  if (!btn||!btn.hasAttribute('data-cpxml')) return;
  var r=state.results[parseInt(btn.getAttribute('data-cpxml'),10)];
  if (!r) return;
  navigator.clipboard.writeText(xmlPlain(r))
    .then(function(){ toast('XML copied!'); })
    .catch(function(){ toast('Copy failed'); });
});

/* ── Tabs ── */
function activateTab(name) {
  document.querySelectorAll('.tab-btn').forEach(function(b) {
    b.classList.toggle('active',b.getAttribute('data-tab')===name);
  });
  document.querySelectorAll('.tab-pane').forEach(function(p) {
    p.classList.toggle('active',p.id==='pane-'+name);
  });
}
document.querySelectorAll('.tab-btn').forEach(function(b) {
  b.addEventListener('click',function(){ activateTab(b.getAttribute('data-tab')); });
});

/* ── Header ── */
document.getElementById('themeBtn').addEventListener('click',function() {
  document.body.classList.toggle('light');
  var light=document.body.classList.contains('light');
  this.textContent=light?'☀️':'🌙';
  try { localStorage.setItem('dci_theme',light?'light':'dark'); } catch(e) {}
  redrawAll();
});

document.getElementById('shareBtn').addEventListener('click',function() {
  if (navigator.share) {
    navigator.share({ title:'DCI Calc', url:window.location.href }).catch(function(){});
  } else {
    navigator.clipboard.writeText(window.location.href)
      .then(function(){ toast('URL copied!'); })
      .catch(function(){ toast('Copy failed'); });
  }
});

/* ── PWA Install Banner ── */
(function() {
  var bar=document.getElementById('install-bar');
  var msg=document.getElementById('install-msg');
  var installBtn=document.getElementById('install-btn');
  var dismissBtn=document.getElementById('install-bar-dismiss');

  var isStandalone=window.navigator.standalone===true
    ||window.matchMedia('(display-mode: standalone)').matches;
  if (isStandalone) return;

  try { if (localStorage.getItem('install-dismissed')==='1') return; } catch(e) {}

  var isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent.toLowerCase())&&!window.MSStream;

  if (isIOS) {
    msg.innerHTML='📲 Tap <strong>Share ⬆️</strong> then <strong>Add to Home Screen</strong>';
    bar.classList.add('show');
    dismissBtn.addEventListener('click',function() {
      bar.classList.remove('show');
      try { localStorage.setItem('install-dismissed','1'); } catch(e) {}
    });
  } else {
    window.addEventListener('beforeinstallprompt',function(e) {
      e.preventDefault(); state.deferredPWA=e;
      msg.textContent='📲 Add DCI Calc to your home screen for offline use';
      installBtn.style.display=''; bar.classList.add('show');
    });
    installBtn.addEventListener('click',function() {
      if (!state.deferredPWA) return;
      state.deferredPWA.prompt();
      state.deferredPWA.userChoice.then(function(result) {
        state.deferredPWA=null; bar.classList.remove('show');
        if (result.outcome==='accepted') toast('App installed! ✅');
      });
    });
    dismissBtn.addEventListener('click',function() {
      bar.classList.remove('show');
      try { localStorage.setItem('install-dismissed','1'); } catch(e) {}
    });
    window.addEventListener('appinstalled',function() {
      bar.classList.remove('show'); toast('App installed! ✅');
    });
  }
}());

/* ── Presets ── */
(function() {
  var row=document.getElementById('presets');
  PRESETS.forEach(function(p) {
    var btn=document.createElement('button');
    btn.className='preset-btn'; btn.textContent=p.label; btn.dataset.v=p.v;
    btn.addEventListener('click',function() {
      document.getElementById('ratio').value=p.v; runCalc();
    });
    row.appendChild(btn);
  });
}());

/* ── Debounce + Inputs ── */
function debounce(fn,ms){ var t; return function(){ clearTimeout(t); t=setTimeout(fn,ms); }; }

document.getElementById('ratio').addEventListener('input',debounce(runCalc,280));
document.getElementById('container').addEventListener('change',runCalc);
document.getElementById('resolution').addEventListener('change',runCalc);
document.getElementById('ratio').addEventListener('focus',function(){ this.select(); });
document.getElementById('rev-w').addEventListener('input',debounce(buildReverse,300));
document.getElementById('rev-h').addEventListener('input',debounce(buildReverse,300));

/* ── Init ── */
(function() {
  try {
    if (localStorage.getItem('dci_theme')==='light') {
      document.body.classList.add('light');
      document.getElementById('themeBtn').textContent='☀️';
    }
  } catch(e) {}
  var params=new URLSearchParams(window.location.hash.slice(1));
  function ls(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
  document.getElementById('ratio').value     =params.get('r')  ||ls('dci_ratio')||'2.39';
  document.getElementById('container').value =params.get('f')  ||ls('dci_fmt')  ||'full';
  document.getElementById('resolution').value=params.get('res')||ls('dci_res')  ||'both';
  runCalc();
}());
</script>

    navigator.serviceWorker.register('./sw.js')
      .then(function(reg){ console.log('SW:',reg.scope); })
      .catch(function(err){ console.warn('SW failed:',err); });
  });
}
